<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">T</span>
      <h1>DeepSeek 翻译</h1>
    </div>

    <div class="section">
      <label class="label">API Key</label>
      <div class="input-row">
        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx" autocomplete="off">
        <button id="toggleKey" class="btn-icon" title="显示/隐藏">&#128065;</button>
      </div>
      <button id="saveKey" class="btn btn-sm btn-primary">保存</button>
      <p id="keyStatus" class="hint"></p>
    </div>

    <hr class="divider">

    <div class="toggle-row">
      <span class="label">自动翻译</span>
      <label class="switch">
        <input type="checkbox" id="autoToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div class="section">
      <button id="translateBtn" class="btn btn-main" disabled>翻译此页</button>
      <button id="restoreBtn" class="btn btn-secondary hidden">恢复原文</button>
    </div>

    <div id="statusSection" class="section hidden">
      <p id="statusText" class="hint"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
